  <style>
:root {
    color-scheme: light dark;
}

body {
    --sans: sans-serif, "Gill Sans", "Segoe UI";
    --serif: serif, "Palatino Linotype", "Palatino", "Book Antiqua", serif;
    --fixed: monospace, "Monaco", "Consolas", "Courier New", monospace;
    --font-size: 1.07rem;
    --line-height: normal;
    --color: #333333;
    --fg: CanvasText;
    --accent: #c0392b;
    color: var(--fg);
    font-family: var(--serif);
    font-size: var(--font-size);
    max-width: 864px;
    margin: 1rem;
    padding: 0 1rem;
}

@media (prefers-color-scheme: dark) {
    body {
        --fg: #cccccc;
        --accent: #e74c3c;
        background: #111;
    }
    a:link    { color: skyblue; }
    a:visited { color: plum; }
}

h1, h2, h3, h4, h5, h6 {
    font-family: var(--sans);
    font-weight: bold;
}

h1 > a:link, h1 > a:visited,
h2 > a:link, h2 > a:visited {
    color: var(--fg);
    text-decoration: none;
}

tt, code, pre {
    font-family: var(--fixed);
    font-size: 0.9em;
}

pre {
    margin-left: 1rem;
    padding: 0.5rem 1rem;
    overflow-x: auto;
}

@media (prefers-color-scheme: dark) {
    pre {
        background: #1e1e1e;
    }
}

@media (prefers-color-scheme: light) {
    pre {
        background: #f4f4f4;
    }
}

p {
    margin-right: 1rem;
    line-height: 1.6;
}

li > p { margin-left: 0; }

blockquote {
    font-style: italic;
    margin-inline-start: 1rem;
    border-left: 3px solid var(--accent);
    padding-left: 1rem;
}

/* ── header ── */

header {
    margin: 1rem 0;
}

header > h1 {
    font-size: 2.5rem;
    margin: 0.5rem 0;
    color: var(--accent);
    font-family: var(--sans);
    font-weight: normal;
}

header > h1 > a:link,
header > h1 > a:visited {
    color: var(--accent);
    text-decoration: none;
}

header > p.tagline {
    font-family: var(--sans);
    font-size: 0.9rem;
    margin: 0 0 0.75rem 0;
    opacity: 0.7;
}

/* ── nav ── */

header > nav > ul {
    font-family: var(--sans);
    list-style: none;
    margin: 0.5rem 0;
    padding: 0;
}

header > nav > ul > li {
    display: inline;
    margin-inline-end: 1.25rem;
}

header > nav > ul > li > a {
    color: var(--fg);
    text-decoration: none;
}

header > nav > ul > li > a:hover {
    text-decoration: underline;
}

header > nav > ul > li > a.active {
    color: var(--accent);
    border-bottom: 1px solid var(--accent);
}

/* ── main ── */

main {
    margin-top: 1rem;
}

main h2 {
    font-size: 1.2rem;
    margin: 1.5rem 0 0.5rem 0;
}

/* ── fork notice on man pages ── */

p.fork-notice {
    font-family: var(--sans);
    font-size: 0.85rem;
    margin-top: 1.5rem;
    margin-bottom: 0.25rem;
    border-left: 2px solid var(--accent);
    padding-left: 0.75rem;
}

/* ── footer ── */

footer {
    --sans: sans-serif, "Gill Sans", "Segoe UI";
    --serif: serif, "Palatino Linotype", "Palatino", "Book Antiqua", serif;
    --fixed: monospace, "Monaco", "Consolas", "Courier New", monospace;
    --font-size: 1.07rem;
    --line-height: normal;
    --color: #333333;
    --fg: CanvasText;
    --accent: #c0392b;
    color: var(--fg);
    font-family: var(--serif);
    font-size: var(--font-size);
    max-width: 864px;
    margin: 1rem;
    padding: 0 1rem;
}

footer a:link, footer a:visited {
    color: var(--fg);
}

hr {
    border: none;
    border-top: 2px solid;
    margin: 1rem 0;
}

  </style>
