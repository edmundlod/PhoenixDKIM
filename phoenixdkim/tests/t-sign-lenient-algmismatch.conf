#
# Without StrictSignAlgorithm (the default), a KeyTable algorithm declaration
# that contradicts the key type only warns; signing proceeds with the
# key-derived algorithm (rsa-sha256 here).

Background		No
Canonicalization	relaxed/simple
RequireSafeKeys		No
KeyTable		file:t-sign-lenient-algmismatch.keys
SigningTable		file:t-sign-lenient-algmismatch.sign
