#
# DKIM2-core modifying re-sign integration test (experimental; requires
# WITH_DKIM2)
#
# Mode "both" so one daemon both verifies inbound (snapshotting a passing
# chain) and signs outbound (re-signing with a recipe when content changed).
# RejectOnFail is off because the outbound re-sign transaction re-verifies the
# now-modified chain -- which legitimately fails -- and must still go on to
# sign rather than reject.  TestDNSData feeds the DKIM2 verifier the public key
# for example.com/test offline (see pubkeys), so the whole flow runs hermetic.

Background		No
Mode			v
RequireSafeKeys		No
DKIM2Mode		both
DKIM2Domain		example.com
DKIM2Selector		test
DKIM2KeyFile		./testkey.private
DKIM2Algorithm		rsa-sha256
DKIM2RejectOnFail	No
DKIM2SnapshotDirectory	./t-dkim2-resign.snap
TestDNSData		file:pubkeys
