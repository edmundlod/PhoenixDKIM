#
# StrictSignAlgorithm fail-closed test
#
# The KeyTable declares ed25519-sha256 for an RSA key.  With
# StrictSignAlgorithm set, that contradiction must make signing fail closed
# (TEMPFAIL) rather than warn and proceed with the key-derived algorithm.

Background		No
Canonicalization	relaxed/simple
RequireSafeKeys		No
StrictSignAlgorithm	Yes
KeyTable		file:t-sign-strict-algmismatch.keys
SigningTable		file:t-sign-strict-algmismatch.sign
