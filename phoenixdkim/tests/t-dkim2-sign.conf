#
# DKIM2-core signing test (experimental; requires WITH_DKIM2)
#
# DKIM1 is left in verify-only mode so the message is signed solely by the
# DKIM2 path, confirming the milter integration in isolation.

Background		No
Mode			v
RequireSafeKeys		No
DKIM2Mode		sign
DKIM2Domain		example.com
DKIM2Selector		test
DKIM2KeyFile		./testkey.private
DKIM2Algorithm		rsa-sha256
