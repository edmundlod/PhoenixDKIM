#
# DKIM2 deliberate-modifier test (experimental; requires WITH_DKIM2)
#
# The filter adds a Subject tag and a body footer, then records the change as a
# modifying DKIM2 re-sign (a new Message-Instance carrying a reversible recipe).
# DKIM1 stays in verify-only mode so only the DKIM2 path touches the message.

Background		No
Mode			v
RequireSafeKeys		No
DKIM2Mode		sign
DKIM2Domain		example.com
DKIM2Selector		test
DKIM2KeyFile		./testkey.private
DKIM2Algorithm		rsa-sha256
DKIM2SubjectTag		[list]
DKIM2Footer		-- PhoenixDKIM test list footer
