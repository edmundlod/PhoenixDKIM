#
# StrictSignAlgorithm with a *matching* KeyTable algorithm declaration must
# not interfere: the message signs normally (rsa-sha256 for an RSA key).

Background		No
Canonicalization	relaxed/simple
RequireSafeKeys		No
StrictSignAlgorithm	Yes
KeyTable		file:t-sign-strict-algmatch.keys
SigningTable		file:t-sign-strict-algmatch.sign
